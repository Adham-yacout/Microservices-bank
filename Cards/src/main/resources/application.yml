server:
  port: 8086

spring:
  application:
    name: "cards"
  profiles:
    active: "prod"
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  datasource:
    url: jdbc:h2:mem:test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
      import: "optional:configserver:http://localhost:8071/"
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"

#enable and expose all management endpoints related to actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"