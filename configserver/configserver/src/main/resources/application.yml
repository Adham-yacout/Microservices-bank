spring:
  application:
    name: "configserver"
  profiles:
    #active: native
    active: git
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/Adham-yacout/Microservices-bank.git"
          default-label: master   # or main (check your branch)
          search-paths: configserver
          clone-on-start: true
          force-pull: true



        #native:
         # search-locations: "classpath:/config"
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    endpoint:
      health:
        probes:
          enabled: true
server:
  port: 8071
