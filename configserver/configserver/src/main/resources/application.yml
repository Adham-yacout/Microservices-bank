spring:
  application:
    name: "configserver"
  profiles:
    #active: native
    active: git
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/Adham-yacout/Microservices-bank.git"
          default-label: master   # or main (check your branch)
          search-paths: configserver
          clone-on-start: true
          force-pull: true
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"


        #native:
         # search-locations: "classpath:/config"
management:
  endpoints:
    web:
      exposure:
        include: "*"
server:
  port: 8071
